name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 * * 1,4'  # Monday & Thursday, 12:00 UTC — well inside the 7-day window
  workflow_dispatch:         # lets you trigger it manually from the Actions tab to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "Response: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/lectures?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"